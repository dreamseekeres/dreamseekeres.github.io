      {
        id: 1,
        title: "IsaacGym 环境搭建：从零开始的踩坑记录",
        category: "practice",
        date: "2026-06-15",
        summary: "记录在 Ubuntu 24.04 + RTX 3050 上搭建 IsaacGym 环境的全过程，包括 Conda 依赖冲突解决、LD_LIBRARY_PATH 设置以及 GPU 渲染问题排查。",
        tags: ["IsaacGym", "Ubuntu", "环境配置", "CUDA"],
        content: `## 环境信息

- OS: Ubuntu 24.04 LTS
- GPU: RTX 3050 + Intel Iris Xe (双显卡)
- Conda 环境: \`dg\` (Python 3.8)
- 关键依赖: \`numpy\`, \`torch\`, \`rsl_rl\`, \`unitree_rl_gym\`

## 踩坑 1：LD_LIBRARY_PATH 问题

IsaacGym 运行时需要手动设置 Conda 的库路径，否则会报找不到 \`libpython3.8.so\` 的错误：

\`\`\`bash
export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$LD_LIBRARY_PATH
\`\`\`

建议写到 \`~/.bashrc\` 里，但注意切换环境后需要重新 source。

## 踩坑 2：双 GPU 渲染冲突

RTX 3050 + Intel Iris Xe 在 IsaacGym GUI 模式下会发生渲染冲突。解决方案是强制使用 Intel 核显：

\`\`\`bash
__NV_PRIME_RENDER_OFFLOAD=0 __GLX_VENDOR_LIBRARY_NAME=intel python train.py
\`\`\`

## 结论

headless 模式（加 \`--headless\` 参数）训练时不存在 GPU 渲染冲突，推荐在正式训练时使用 headless。`
      },
      {
        id: 2,
        title: "PPO 算法深度解析：从理论到 rsl_rl 实现",
        category: "theory",
        date: "2026-06-10",
        summary: "深入理解 Proximal Policy Optimization（PPO）算法的核心机制，结合 rsl_rl 库的具体实现，分析 clip ratio、GAE 优势估计和 entropy bonus 的作用。",
        tags: ["PPO", "强化学习", "rsl_rl", "策略梯度"],
        content: `## PPO 的核心思想

PPO 是目前机器人强化学习中最常用的算法之一，核心思想是通过**截断（clipping）**来约束策略更新步长，避免更新过大导致训练不稳定。

## Clip Objective

\`\`\`python
ratio = pi(a|s) / pi_old(a|s)
L_clip = min(ratio * A, clip(ratio, 1-eps, 1+eps) * A)
\`\`\`

其中 \`eps\` 通常设为 0.2。

## GAE 优势估计

Generalized Advantage Estimation (GAE) 通过引入 \`lambda\` 参数平衡偏差和方差：

- \`lambda = 0\`：一步 TD，低方差高偏差
- \`lambda = 1\`：Monte Carlo，高方差低偏差
- rsl_rl 默认 \`lambda = 0.95\`

## 在 IsaacGym 中的体会

并行环境数量（\`num_envs\`）是影响样本效率的关键参数。4096 个并行环境下，一次 rollout 就能收集大量样本，显著加速训练。`

        id: 3,
        title: "Curriculum Learning 在抛球任务中的设计与调优",
        category: "rl",
        date: "2026-06-05",
        summary: "记录 B2Z1 精准抛球任务中 curriculum learning 的设计思路：从近距离逐步扩展至 8m 目标，以及 MinDist 参数调整对训练稳定性的影响。",
        tags: ["Curriculum Learning", "B2Z1", "IsaacGym", "奖励函数"],
        content: `## 问题背景

在 \`b2z1_throw_precise.py\` 中，训练到 5m 距离就陷入瓶颈，无法继续晋级。经分析，主要问题有：

1. **target_reward 设计问题**：原来对所有目标帧都发奖励，导致多目标干扰
2. **投掷插值时间过短**：影响抛球质量
3. **robot_base_pos 未更新**：导致 curriculum 距离计算偏差

## 修复方案

### 1. target_reward 只奖励最近目标帧

\`\`\`python
# Before: 对所有目标帧发奖励
# After: 只对最近目标帧发奖励
nearest_target_idx = torch.argmin(dist_to_targets, dim=-1)
target_reward = reach_goal_bonus[nearest_target_idx]

    // ── State ──
    let currentFilter = 'all';
    let posts = [];

    function loadPosts() {
      const saved = localStorage.getItem('ml_journal_posts');
      if (saved) {
        try { posts = JSON.parse(saved); }
        catch { posts = [...DEFAULT_POSTS]; }
      } else {
        posts = [...DEFAULT_POSTS];
      }
    }

    function savePosts() {
      localStorage.setItem('ml_journal_posts', JSON.stringify(posts));
    }

    // ── Render ──
    function renderPosts() {
      const list = document.getElementById('post-list');
      const filtered = currentFilter === 'all' ? posts : posts.filter(p => p.category === currentFilter);
      
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">还没有日志</div><div class="empty-desc">点击"写新日志"开始记录你的学习旅程</div></div>`;
        return;
      }

      list.innerHTML = filtered.map(p => `
        <div class="post-card ${p.category}" onclick="openPost(${p.id})">
          <div class="post-meta">
            <span class="post-date">${p.date}</span>
            <span class="post-tag ${p.category}">${categoryLabel(p.category)}</span>
          </div>
          <div class="post-title">${escHtml(p.title)}</div>
          <div class="post-summary">${escHtml(p.summary)}</div>
          <div class="post-footer">
            <div class="post-tags">${p.tags.slice(0,4).map(t => `<span class="post-chip">${escHtml(t)}</span>`).join('')}</div>
            <span class="read-more">阅读全文 →</span>
          </div>
        </div>
      `).join('');
    }

    function renderStats() {
      document.getElementById('total-posts').textContent = posts.length;
      const allTags = new Set(posts.flatMap(p => p.tags));
      document.getElementById('total-tags').textContent = allTags.size;
      const dates = posts.map(p => p.date).sort().reverse();
      document.getElementById('last-update').textContent = dates[0] ? dates[0].slice(5) : '—';

      const counts = { all: posts.length, rl: 0, theory: 0, practice: 0, paper: 0 };
      posts.forEach(p => { if (counts[p.category] !== undefined) counts[p.category]++; });
      Object.keys(counts).forEach(k => {
        const el = document.getElementById('count-' + k);
        if (el) el.textContent = counts[k];
      });
    }

    function renderTagsCloud() {
      const tagCount = {};
      posts.forEach(p => p.tags.forEach(t => tagCount[t] = (tagCount[t] || 0) + 1));
      const sorted = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0, 20);
      const cloud = document.getElementById('tags-cloud');
      cloud.innerHTML = sorted.map(([t]) => `<span class="tag-chip" onclick="searchTag('${escHtml(t)}')">${escHtml(t)}</span>`).join('');
    }

    function categoryLabel(cat) {
      return { rl: '强化学习', theory: '理论笔记', practice: '实战记录', paper: '论文阅读' }[cat] || cat;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Filter ──
    function filterPosts(cat, el) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
      if (el) {
        el.classList.add('active');
        const sideEl = document.querySelector(`.sidebar-link[onclick*="'${cat}'"]`);
        if (sideEl) sideEl.classList.add('active');
      }
      renderPosts();
      return false;
    }

    // ── Post modal ──
    function openPost(id) {
      const p = posts.find(x => x.id === id);
      if (!p) return;
      const content = renderMarkdown(p.content);
      document.getElementById('modal-inner').innerHTML = `
        <h2>${escHtml(p.title)}</h2>
        <div class="modal-meta">
          <span class="post-date">${p.date}</span>
          <span class="post-tag ${p.category}">${categoryLabel(p.category)}</span>
          ${p.tags.map(t => `<span class="post-chip">${escHtml(t)}</span>`).join('')}
        </div>
        <div class="modal-content">${content}</div>
      `;
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Simple markdown renderer
    function renderMarkdown(md) {
      return md
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^### (.+)$/gm, '<h3 style="font-size:15px">$1</h3>')
        .replace(/^\*\*(.+)\*\*$/gm, '<strong>$1</strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
        .replace(/^> (.+)$/gm, '<div class="highlight">$1</div>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hup]|<li|<pre|<div)(.+)$/gm, (m) => m.trim() ? m : '')
        .replace(/^(<h[23]>|<pre>|<ul>|<div class="highlight">)/, '$1')
        .replace(/\n/g, '<br>');
    }

    // ── New post ──
    function toggleNewPost(e) {
      if (e) e.preventDefault();
      const form = document.getElementById('new-post-form');
      form.classList.toggle('open');
      if (form.classList.contains('open')) {
        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function savePost() {
      const title = document.getElementById('form-title').value.trim();
      const category = document.getElementById('form-category').value;
      const tagsRaw = document.getElementById('form-tags').value;
      const content = document.getElementById('form-content').value.trim();

      if (!title || !content) { alert('请填写标题和内容'); return; }

      const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
      const today = new Date().toISOString().slice(0, 10);
      const summary = content.replace(/```[\s\S]*?```/g, '').replace(/[#*`>\-]/g, '').trim().slice(0, 120) + '...';

      const newPost = {
        id: Date.now(),
        title, category, date: today,
        summary: summary || content.slice(0, 120) + '...',
        tags: tags.length ? tags : ['笔记'],
        content
      };

      posts.unshift(newPost);
      savePosts();
      renderAll();
      document.getElementById('new-post-form').classList.remove('open');
      document.getElementById('form-title').value = '';
      document.getElementById('form-tags').value = '';
      document.getElementById('form-content').value = '';
    }

    function searchTag(tag) {
      // Future: filter by tag
    }

    function renderAll() {
      renderStats();
      renderPosts();
      renderTagsCloud();
    }

    // ── Init ──
    loadPosts();
    renderAll();
  </script>
</body>
